services:
  - type: web
    name: translex
    runtime: node
    rootDir: .
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: GITHUB_MODELS_MODEL
        value: openai/gpt-4.1-mini
